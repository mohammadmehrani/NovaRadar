name: Android CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Production Keystore
        run: |
          keytool -genkeypair -v \
            -keystore ${{ github.workspace }}/nova-radar-key.jks \
            -alias nova-radar \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass NovaRadar2026 \
            -keypass NovaRadar2026 \
            -dname "CN=NovaRadar, OU=Dev, O=Nova, L=World, S=World, C=US" \
            -storetype JKS

      - name: Build with Gradle
        run: ./gradlew assembleRelease bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/nova-radar-key.jks

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
