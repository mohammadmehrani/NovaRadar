name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      create_release:
        description: 'Build APKs and create GitHub Release'
        required: true
        default: true
        type: boolean

  push:
    tags:
      - 'v*'

jobs:
  version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bumped.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read & bump version
        id: bumped
        run: |
          VERSION=$(grep -oP 'appVersionName\s*=\s*"\K[^"]+' nova-radar-android-app/app/build.gradle.kts)
          echo "Current: $VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          TYPE="${{ github.event.inputs.version_type }}"
          if [ "$TYPE" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0; fi
          if [ "$TYPE" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0; fi
          if [ "$TYPE" = "patch" ]; then PATCH=$((PATCH+1)); fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

      - name: Update files
        run: |
          sed -i "s/appVersionName = \".*\"/appVersionName = \"${{ steps.bumped.outputs.new_version }}\"/" nova-radar-android-app/app/build.gradle.kts
          VC=$(grep -oP 'versionCode\s*=\s*\K\d+' nova-radar-android-app/app/build.gradle.kts)
          sed -i "s/versionCode = .*/versionCode = $((VC+1))/" nova-radar-android-app/app/build.gradle.kts
          sed -i "s/Version: ${{ steps.bumped.outputs.new_version }}/Version: ${{ steps.bumped.outputs.new_version }}/" AGENTS.md 2>/dev/null || true
          # Update version history in AGENTS.md
          sed -i "s/| [0-9.]* | 2026-[0-9-]* | .*/| ${{ steps.bumped.outputs.new_version }} | $(date +%F) | Automated release |/" AGENTS.md 2>/dev/null || true

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nova-radar-android-app/app/build.gradle.kts AGENTS.md 2>/dev/null || git add nova-radar-android-app/app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.bumped.outputs.new_version }}"
          git tag -a "v${{ steps.bumped.outputs.new_version }}" -m "v${{ steps.bumped.outputs.new_version }}"
          git push origin "v${{ steps.bumped.outputs.new_version }}"

  build:
    needs: version
    if: always() && (github.event_name != 'workflow_dispatch' || (needs.version.result == 'success' && github.event.inputs.create_release == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          mkdir -p "${{ github.workspace }}/nova-radar-android-app"
          if [ -n "${{ secrets.KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "${{ github.workspace }}/nova-radar-android-app/nova-scanner-key.jks"
            echo "Keystore decoded from secret"
          else
            keytool -genkeypair -v \
              -keystore "${{ github.workspace }}/nova-radar-android-app/nova-scanner-key.jks" \
              -alias nova-scanner -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" \
              -dname "CN=NovaScanner, OU=Dev, O=NovaProxy, L=World, S=World, C=US"
            echo "Temporary keystore generated (run scripts/setup-secrets.ps1 to store permanently)"
          fi

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: nova-radar-android-app

      - name: Build APKs + AAB
        run: ./gradlew assembleRelease bundleRelease
        working-directory: nova-radar-android-app
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/nova-radar-android-app/nova-scanner-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" -- ':!.github')
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" -30 -- ':!.github')
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nova-radar-android-app/app/build/outputs/apk/release/*.apk
            nova-radar-android-app/app/build/outputs/bundle/release/*.aab
          tag_name: ${{ github.ref_name }}
          name: Nova Radar ${{ github.ref_name }}
          body: |
            ## 📡 Nova Radar ${{ github.ref_name }}

            ### Download APKs
            | Architecture | File |
            |---|---|
            | ARM64 | NovaRadar-v${{ github.ref_name }}-arm64-v8a-release.apk |
            | ARMv7 | NovaRadar-v${{ github.ref_name }}-armeabi-v7a-release.apk |
            | x86 | NovaRadar-v${{ github.ref_name }}-x86-release.apk |
            | x86_64 | NovaRadar-v${{ github.ref_name }}-x86_64-release.apk |
            | Universal | NovaRadar-v${{ github.ref_name }}-universal-release.apk |

            ### Changes
            ${{ steps.notes.outputs.notes }}

            ### Build Info
            - **Version**: ${{ github.ref_name }}
            - **Min SDK**: 24 (Android 7.0)
            - **Target SDK**: 35
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          chmod +x scripts/sync-upstream.sh
          bash scripts/sync-upstream.sh .upstream/config.json || true
          git push origin upstream-base --force 2>/dev/null || true

      - name: Create upstream PR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          PR_EXISTS=$(gh pr view 7 --repo IRNova/NovaRadar --json number 2>/dev/null || echo "")
          BODY="## Nova Radar Android ${{ github.ref_name }}

          Android port (Kotlin/Jetpack Compose) of IRNova/NovaRadar.

          ### 📥 Download
          [Download ${{ github.ref_name }}](${RELEASE_URL})

          ### Source
          https://github.com/mohammadmehrani/NovaRadar"
          if [ -z "$PR_EXISTS" ]; then
            gh pr create --repo IRNova/NovaRadar --head mohammadmehrani:NovaRadar:upstream-base --base main \
              --title "Nova Radar Android ${{ github.ref_name }}" --body "$BODY" && \
            gh pr merge 7 --repo IRNova/NovaRadar --squash --auto 2>/dev/null || true
          else
            gh pr edit 7 --repo IRNova/NovaRadar --title "Nova Radar Android ${{ github.ref_name }}" \
              --body "Updated to ${{ github.ref_name }}

          📥 [${{ github.ref_name }}](${RELEASE_URL})" && \
            gh pr ready 7 --repo IRNova/NovaRadar 2>/dev/null || true
          fi
